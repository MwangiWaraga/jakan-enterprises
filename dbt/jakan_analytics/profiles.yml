jakan_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_WAREHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_WAREHOUSE_PORT', 5432) | as_number }}"
      user: "{{ env_var('DBT_WAREHOUSE_USER', 'jakan') }}"
      password: "{{ env_var('DBT_WAREHOUSE_PASSWORD', 'jakan_dev_password') }}"
      dbname: "{{ env_var('DBT_WAREHOUSE_DB', 'jakan_warehouse') }}"
      schema: marts
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
